name: web-app

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3


      - name: Docker Credentials
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/flask_application:${{ github.sha }} \
                       -t ${{ secrets.DOCKER_USERNAME }}/flask_application:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/flask_application:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/flask_application:latest


      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/flask_application:latest
            docker stop flask_container || true
            docker rm flask_container || true
            docker run -d -p 5000:8000 --name flask_container \
              ${{ secrets.DOCKER_USERNAME }}/flask_application:latest